<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Ra 后台管理</title>
    <link rel="stylesheet" href="./styles.css?v=ra-20260623-3" />
  </head>
  <body class="RaPage RaAdminPage RaAuthPending">
    <header class="RaTopbar">
      <a class="RaBrand" href="./index.html">
        <span class="RaBrandMark">Ra</span>
        <span>
          <strong>Ralph Admin</strong>
          <small>Content Studio</small>
        </span>
      </a>
      <nav class="RaNav">
        <a href="./index.html">前台</a>
        <a href="#RaSettingsPanel">设置</a>
        <a href="#RaEditorPanel">编辑</a>
        <a href="#RaProfilePanel">简历</a>
        <a href="#RaAccountsPanel" id="RaAccountsNavLink">账号</a>
        <button id="RaLogoutButton" class="RaNavButton" type="button">退出</button>
      </nav>
    </header>

    <main class="RaAdminShell" id="RaAdminShell" hidden>
      <section class="RaPanel" id="RaSettingsPanel">
        <div class="RaSectionHeading">
          <p class="RaEyebrow">Repository</p>
          <h1>仓库连接</h1>
        </div>
        <div class="RaQuickConnect">
          <label class="RaField">
            GitHub 仓库地址
            <input id="RaRepoUrlInput" placeholder="https://github.com/Galphrui/ralphrong" />
          </label>
          <div class="RaActions">
            <button id="RaApplyRepoUrlButton" type="button">应用仓库地址</button>
            <button id="RaDetectRepoButton" class="RaSecondaryButton" type="button">从当前网址识别</button>
            <a id="RaOpenDataLink" class="RaLinkButton" href="#" target="_blank" rel="noreferrer">打开数据文件</a>
          </div>
          <p class="RaHint" id="RaRepoHint">填写仓库地址后，后台会自动生成 owner、repo、branch 和数据路径。</p>
        </div>
        <div class="RaFormGrid">
          <label class="RaField">
            GitHub 用户名或组织
            <input id="RaOwnerInput" autocomplete="username" placeholder="your-github-name" />
          </label>
          <label class="RaField">
            仓库名
            <input id="RaRepoInput" placeholder="your-blog-repo" />
          </label>
          <label class="RaField">
            分支
            <input id="RaBranchInput" placeholder="main" />
          </label>
          <label class="RaField">
            数据文件路径
            <input id="RaPathInput" placeholder="data/posts.json" />
          </label>
        </div>
        <div class="RaActions">
          <button id="RaSaveSettingsButton" type="button">保存设置</button>
          <button id="RaLoadRemoteButton" class="RaSecondaryButton" type="button">读取数据</button>
          <button id="RaOpenRepoButton" class="RaSecondaryButton" type="button">打开仓库</button>
          <button id="RaDownloadButton" class="RaSecondaryButton" type="button">导出 JSON</button>
          <label class="RaFileButton">
            导入 JSON
            <input id="RaImportInput" type="file" accept="application/json" />
          </label>
        </div>
        <p class="RaHint">账号注册和账号控制只在本地后台开放；外网后台只允许已注册账号登录和编辑内容。</p>
      </section>

      <section class="RaAdminGrid">
        <aside class="RaPanel">
          <div class="RaSectionHeading">
            <p class="RaEyebrow">Posts</p>
            <h2>文章列表</h2>
          </div>
          <button id="RaNewPostButton" type="button">新建文章</button>
          <div class="RaList" id="RaAdminPostList"></div>
        </aside>

        <section class="RaPanel" id="RaEditorPanel">
          <div class="RaSectionHeading">
            <p class="RaEyebrow">Editor</p>
            <h2>内容编辑</h2>
          </div>
          <form id="RaPostForm">
            <div class="RaFormGrid">
              <label class="RaField">
                标题
                <input id="RaTitleInput" required />
              </label>
              <label class="RaField">
                Slug
                <input id="RaSlugInput" required />
              </label>
              <label class="RaField">
                发布日期
                <input id="RaDateInput" type="date" required />
              </label>
              <label class="RaField">
                标签，逗号分隔
                <input id="RaTagsInput" placeholder="JavaScript, 架构" />
              </label>
              <label class="RaField RaWide">
                摘要
                <textarea id="RaSummaryInput" rows="3"></textarea>
              </label>
              <label class="RaField RaWide">
                正文 Markdown
                <textarea id="RaContentInput" rows="14"></textarea>
              </label>
            </div>
            <div class="RaActions">
              <button type="submit">保存到数据</button>
              <button id="RaDeletePostButton" class="RaDangerButton" type="button">删除文章</button>
              <button id="RaPublishButton" class="RaPublishButton" type="button">发布</button>
            </div>
          </form>
          <p class="RaStatus" id="RaStatusText" role="status"></p>
        </section>
      </section>

      <section class="RaPanel">
        <div class="RaSectionHeading">
          <p class="RaEyebrow">Site</p>
          <h2>站点信息</h2>
        </div>
        <div class="RaFormGrid">
          <label class="RaField">
            站点标题
            <input id="RaSiteTitleInput" />
          </label>
          <label class="RaField">
            副标题
            <input id="RaSiteSubtitleInput" />
          </label>
          <label class="RaField">
            作者
            <input id="RaAuthorInput" />
          </label>
          <label class="RaField RaWide">
            作者简介
            <textarea id="RaBioInput" rows="3"></textarea>
          </label>
        </div>
        <div class="RaActions">
          <button id="RaSaveSiteButton" type="button">保存站点信息</button>
        </div>
      </section>

      <section class="RaPanel" id="RaProfilePanel">
        <div class="RaSectionHeading">
          <p class="RaEyebrow">Profile</p>
          <h2>Ra 个人简历</h2>
        </div>
        <div class="RaFormGrid">
          <label class="RaField">
            姓名 / 署名
            <input id="RaProfileNameInput" />
          </label>
          <label class="RaField">
            标题
            <input id="RaProfileHeadlineInput" />
          </label>
          <label class="RaField RaWide">
            联系信息（每行一条）
            <textarea id="RaProfileContactsInput" rows="3"></textarea>
          </label>
          <label class="RaField RaWide">
            求职意向
            <textarea id="RaProfileIntentInput" rows="2"></textarea>
          </label>
          <label class="RaField RaWide">
            简介
            <textarea id="RaProfileSummaryInput" rows="3"></textarea>
          </label>
          <label class="RaField RaWide">
            个人优势（每行一条）
            <textarea id="RaProfileAdvantagesInput" rows="6"></textarea>
          </label>
          <label class="RaField RaWide">
            核心技能 JSON
            <textarea id="RaProfileSkillsInput" rows="10"></textarea>
          </label>
          <label class="RaField RaWide">
            工作经历 JSON
            <textarea id="RaProfileWorkInput" rows="10"></textarea>
          </label>
          <label class="RaField RaWide">
            项目经历 JSON
            <textarea id="RaProfileProjectsInput" rows="14"></textarea>
          </label>
          <label class="RaField RaWide">
            教育经历 JSON
            <textarea id="RaProfileEducationInput" rows="6"></textarea>
          </label>
          <label class="RaField RaWide">
            个人评价（每行一条）
            <textarea id="RaProfileReviewInput" rows="5"></textarea>
          </label>
        </div>
        <div class="RaActions">
          <button id="RaSaveProfileButton" type="button">保存简历</button>
          <button id="RaFormatProfileButton" class="RaSecondaryButton" type="button">格式化 JSON</button>
        </div>
      </section>

      <section class="RaPanel" id="RaAccountsPanel">
        <div class="RaSectionHeading">
          <p class="RaEyebrow">Accounts</p>
          <h2>账号管理</h2>
        </div>
        <p class="RaHint">
          账号管理只在本地后台服务中可用。保存后提交并推送 `data/admin-users.json`，外网后台会读取这些哈希数据登录。
        </p>
        <div class="RaList" id="RaAccountList"></div>
        <div class="RaFormGrid">
          <label class="RaField">
            账号
            <input id="RaAccountUserInput" placeholder="new-admin" />
          </label>
          <label class="RaField">
            新密码
            <input id="RaAccountPasswordInput" type="password" autocomplete="new-password" />
          </label>
        </div>
        <div class="RaActions">
          <button id="RaCreateAccountButton" type="button">新增账号</button>
          <button id="RaResetPasswordButton" class="RaSecondaryButton" type="button">重置密码</button>
          <button id="RaDeleteAccountButton" class="RaDangerButton" type="button">删除账号</button>
          <button id="RaRefreshAccountsButton" class="RaSecondaryButton" type="button">刷新账号</button>
        </div>
        <p class="RaStatus" id="RaAccountStatus" role="status"></p>
      </section>
    </main>

    <script src="./admin-config.js?v=ra-20260623-3"></script>
    <script src="./admin.js?v=ra-20260623-3"></script>
  </body>
</html>
